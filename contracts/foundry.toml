[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"

[etherscan]
sepolia = { key = "${ETHERSCAN_KEY}" }
base_sepolia = { key = "${BASESCAN_KEY}", url = "https://api-sepolia.basescan.org/api" }
